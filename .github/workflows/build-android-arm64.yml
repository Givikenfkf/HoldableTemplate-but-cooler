name: Build Android arm64 Library

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Compile arm64-v8a .so
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Pick latest pre-installed NDK
        run: |
          NDK_PATH=$(ls -d $ANDROID_SDK_ROOT/ndk/* | sort -V | tail -1)
          echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
          echo "NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
          echo "Using NDK: $NDK_PATH"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build arm64-v8a native library
        run: ./gradlew assembleRelease -Pandroid.injected.build.abi=arm64-v8a

      - name: Locate compiled .so files
        run: find . -name "*.so" -path "*/arm64-v8a/*"

      - name: Upload arm64-v8a .so
        uses: actions/upload-artifact@v4
        with:
          name: arm64-v8a-lib
          path: app/build/intermediates/cmake/release/obj/arm64-v8a/*.so
          if-no-files-found: warn
          retention-days: 30

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 30
