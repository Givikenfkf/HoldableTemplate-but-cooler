name: Build Android arm64 Library

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Compile arm64-v8a .so
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android NDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true
          packages: |
            ndk;27.2.12479018
            cmake;3.22.1

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build arm64-v8a native library
        run: ./gradlew assembleRelease
        env:
          ANDROID_ABI: arm64-v8a

      - name: Locate compiled .so files
        run: |
          echo "=== Built .so files ==="
          find . -name "*.so" -path "*/arm64-v8a/*" | tee built_libs.txt
          echo ""
          echo "=== All build outputs ==="
          find ./app/build/outputs -type f 2>/dev/null || echo "No outputs directory found"

      - name: Upload arm64-v8a library
        uses: actions/upload-artifact@v4
        with:
          name: arm64-v8a-lib
          path: |
            app/build/intermediates/cmake/release/obj/arm64-v8a/*.so
            app/build/outputs/**/*.so
          if-no-files-found: warn
          retention-days: 30

      - name: Upload full APK (contains the .so)
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 30
